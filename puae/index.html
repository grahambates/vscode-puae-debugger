<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PUAE wasm debugger backend</title>
<style>
  body { margin: 0; padding: 0; }
  #screen { display: block; width: 100%; }
  /* Click-to-focus keyboard capture (keyboardCapture.ts) — a subtle cue that
     the canvas, not the page, currently receives key events. Plain :focus
     (not :focus-visible): focus is acquired via a mouse click here, which
     :focus-visible heuristics would otherwise treat as "not keyboard
     intent" and suppress the very indicator this is for. */
  #screen:focus { outline: 1px solid var(--vscode-focusBorder, #007fd4); outline-offset: -1px; }
  #controls, #dma-overlay, #channel-visibility {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px 14px;
    padding: 3px 6px;
    box-sizing: border-box;
    font-family: var(--vscode-font-family, sans-serif);
    font-size: var(--vscode-font-size, 12px);
    color: var(--vscode-foreground);
  }
  #dma-overlay, #channel-visibility {
    border-top: 1px solid var(--vscode-panel-border, #444);
  }
  #controls label, .chan-group-label {
    opacity: 0.65;
    font-size: inherit;
    color: inherit;
    line-height: 1;
  }
  #controls select {
    background: var(--vscode-dropdown-background);
    color: var(--vscode-dropdown-foreground);
    border: 1px solid var(--vscode-dropdown-border, transparent);
    vertical-align: middle;
  }
  .chan-group { display: flex; align-items: center; gap: 4px; }
  .chan-grid { display: flex; gap: 2px; }
  .chan-btn {
    min-width: 16px;
    height: 16px;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    line-height: 1;
    border: 1px solid var(--vscode-panel-border, #555);
    border-radius: 2px;
    background: transparent;
    color: var(--vscode-foreground);
    opacity: 0.4;
    cursor: pointer;
    user-select: none;
    padding: 0 3px;
  }
  .chan-btn.active {
    opacity: 1;
    background: var(--chan-color, var(--vscode-button-background, #0e639c));
    border-color: var(--chan-color, var(--vscode-button-background, #0e639c));
    color: #fff;
  }
  .chan-btn:hover { opacity: 0.75; }
  .chan-btn.active:hover { opacity: 1; }
  #dma-overlay.disabled .opacity-row {
    opacity: 0.4;
    pointer-events: none;
  }
  .chan-btn.all-btn { font-weight: bold; }
  .opacity-row { display: flex; align-items: center; gap: 4px; }
  .opacity-row input[type=range] { width: 70px; vertical-align: middle; }
  .blit-decay { display: inline-flex; align-items: center; gap: 4px; }
  .blit-decay input[type=range] { width: 56px; vertical-align: middle; }
  .blit-decay #blit-decay-val { opacity: 0.65; min-width: 3ch; }
  .blit-decay.disabled { opacity: 0.4; pointer-events: none; }
  #audio-toggle {
    margin-left: auto;
    width: 22px;
    height: 22px;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    border-radius: 2px;
    background: none;
    color: var(--vscode-foreground);
    cursor: pointer;
    opacity: 0.75;
  }
  #audio-toggle .codicon { font-size: 16px; }
  #audio-toggle:hover { opacity: 1; background: var(--vscode-toolbar-hoverBackground, rgba(128,128,128,0.2)); }
</style>
</head>
<body>
<canvas id="screen" width="720" height="574"></canvas>
<div id="controls">
  <label for="speed">Speed:</label>
  <select id="speed">
    <option value="1" selected>100%</option>
    <option value="0.5">50%</option>
    <option value="0.25">25%</option>
    <option value="0.1">10%</option>
  </select>
  <button id="warp" type="button" class="chan-btn" title="Toggle warp mode">WARP</button>
  <button id="blit-vis" type="button" class="chan-btn" title="Highlight blit regions" style="--chan-color:#008888">BLIT</button>
  <span id="blit-decay-row" class="blit-decay disabled" title="How many frames a blit stays highlighted — raise it for triple buffering / longer frame rings">
    <input id="blit-decay" type="range" min="1" max="60" value="8">
    <span id="blit-decay-val">8f</span>
  </span>
  <button id="audio-toggle" type="button" title="Unmute audio"><i class="codicon codicon-mute"></i></button>
</div>
<div id="dma-overlay"></div>
<div id="channel-visibility"></div>
<!-- <div id="status">Loading…</div> -->

<script src="puae.js"></script>
<script type="module">
import { main } from './puae_app.js';

main({
  wasmLocateFile: undefined,
  romUrl: '[ROMPATH]',
  extraConfigB64: '',
  programB64: '',
  hardDriveManifestB64: '',
  expectedProcessName: '',
  audioWorkletUrl: './puae_audioprocessor.js',
  bufferedPlaybackFrames: 0,
}).catch(e => {
  console.error(e);
});
</script>
</body>
</html>
